name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          version="${GITHUB_REF_NAME#v}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.version=${version} -X main.commit=${GITHUB_SHA} -X main.buildDate=${build_date}"

          build() {
            local goos="$1"
            local goarch="$2"
            local ext="$3"
            local bin="mr-queue${ext}"
            local asset="mr-queue_${goos}_${goarch}"
            local work="dist/release/${asset}"
            mkdir -p "${work}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 go build -trimpath -ldflags "${ldflags}" -o "${work}/${bin}" ./cmd/mr-queue
            cp README.md mr-queue.yml.example .env.example "${work}/"
            if [ "${goos}" = "windows" ]; then
              (cd dist/release && zip -qr "${asset}.zip" "${asset}")
            else
              tar -C dist/release -czf "dist/release/${asset}.tar.gz" "${asset}"
            fi
            rm -rf "${work}"
          }

          build linux amd64 ""
          build linux arm64 ""
          build darwin amd64 ""
          build darwin arm64 ""
          build windows amd64 ".exe"

          (cd dist/release && shasum -a 256 mr-queue_* > checksums.txt)

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/release/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "mr-queue ${GITHUB_REF_NAME}"
